name: Spring Boot CI/CD Pipeline (Microsoft OpenJDK)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Koodka ka soo qaad GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup-garee Microsoft OpenJDK (Aad u muhiim ah)
      - name: Set up Microsoft OpenJDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'          # Nooca Java-gaaga (21 ama 25)
          distribution: 'microsoft'   # Halkan waxaa laga dhigay Microsoft!
          cache: maven

      # 3. Samee imtixaanka koodka (Run Tests)
      - name: Run Unit Tests
        run: mvn test

      # 4. U log-in garee Docker Hub si ammaan ah
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build-garee Docker Image ka dibna u rur (Push) Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/seat-scan:v1
            ${{ secrets.DOCKERHUB_USERNAME }}/seat-scan:${{ github.sha }}