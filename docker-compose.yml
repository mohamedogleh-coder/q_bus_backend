version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: bus_database
    restart: always
    environment:
      POSTGRES_USER: ogleh
      POSTGRES_PASSWORD: 1122
      POSTGRES_DB: bus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: bus_database_ui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
volumes:
  postgres_data:
  pgadmin_data: