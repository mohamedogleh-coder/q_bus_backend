spring:
  config:
    import: "optional:file:.env[.properties]"
    #Kan wuxuu sababayaa in spring boot soo akhriyo properties ka oo fly way aanu ka hor kicin
  application:
    name: q_bus_backend

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://otfloobvxifgzklljdoy.supabase.co/auth/v1
  datasource:
    primary:
       username: ${PRIMARY_DB_USER}
       url: ${PRIMARY_DB_URL}
       password: ${PRIMARY_DB_PASSWORD}
       driver-class-name: org.postgresql.Driver
    secondary:
      url: ${SUPABASE_URL}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true